// ═══════════════════════════════════════════════════════════
// DB HELPERS (Realtime Database)
// ═══════════════════════════════════════════════════════════
const ref = (path) => db.ref(path);

async function dbGet(path) {
  const snap = await ref(path).once('value');
  return snap.val();
}
async function dbSet(path, data) { await ref(path).set(data); }
async function dbPush(path, data) {
  const r = ref(path).push();
  await r.set({...data, _id: r.key});
  return r.key;
}
async function dbUpdate(path, data) { await ref(path).update(data); }
async function dbRemove(path) { await ref(path).remove(); }
function dbListen(path, cb) {
  ref(path).on('value', snap => {
    const val = snap.val();
    const arr = val ? Object.values(val).filter(Boolean) : [];
    cb(arr);
  }, err => {
    console.error('Erro de leitura em "'+path+'":', err);
    showToast('Sem permissão para ler "'+path+'". Ajuste as regras do Realtime Database.','error');
  });
  return () => ref(path).off();
}

// ═══════════════════════════════════════════════════════════
// AUTH HELPERS
// ═══════════════════════════════════════════════════════════
async function signIn(email, password) { return auth.signInWithEmailAndPassword(email, password); }
async function signUp(email, password) { return auth.createUserWithEmailAndPassword(email, password); }
async function signOut() { return auth.signOut(); }
async function resetPassword(email) { return auth.sendPasswordResetEmail(email); }
async function changePassword(newPassword) { return auth.currentUser.updatePassword(newPassword); }

const fmt = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const fmtPct = v => `${Math.round(v||0)}%`;
const today = () => new Date().toISOString().split('T')[0];
const nowStr = () => new Date().toISOString();

function getHoje(arr){return(arr||[]).filter(v=>v.dataVenda===today());}
function getSemana(arr){const d=new Date();d.setDate(d.getDate()-7);return(arr||[]).filter(v=>new Date(v.dataVenda)>=d);}
function getMes(arr){const m=new Date().toISOString().slice(0,7);return(arr||[]).filter(v=>(v.dataVenda||'').startsWith(m));}
function sum(arr,k='valorTotal'){return(arr||[]).reduce((a,b)=>a+(Number(b[k])||0),0);}

function applyConfig(cfg){
  if(!cfg) return;
  document.documentElement.style.setProperty('--cor', cfg.corPrimaria||'#2563EB');
  document.documentElement.style.setProperty('--cor2', cfg.corSecundaria||'#10B981');
  document.documentElement.style.setProperty('--sidebar', cfg.corSidebar||'#0F1B2D');
  document.documentElement.style.setProperty('--fundo', cfg.corFundo||'#F9FAFB');
  if(cfg.fonte) document.body.style.fontFamily = `'${cfg.fonte}',sans-serif`;
  if(cfg.tamanhoFonte) document.body.style.fontSize = cfg.tamanhoFonte+'px';
}
function showToast(msg,type='info'){setState({toast:{msg,type}});setTimeout(()=>setState({toast:null}),3500);}

window.paStep1=function(){
  const nome=document.getElementById('pa-nome')?.value?.trim();
  const email=document.getElementById('pa-email')?.value?.trim();
  const senha=document.getElementById('pa-senha')?.value;
  const confirmar=document.getElementById('pa-confirmar')?.value;
  if(!nome||!email||!senha){showToast('Preencha todos os campos','error');return;}
  if(senha!==confirmar){showToast('Senhas não coincidem','error');return;}
  if(senha.length<6){showToast('Senha mínimo 6 caracteres','error');return;}
  _paDados={nome,email,senha};_paStep=2;render();
};
window.paCriar=async function(){
  const empresa=document.getElementById('pa-empresa')?.value?.trim()||'VendasPro';
  const slogan=document.getElementById('pa-slogan')?.value?.trim()||'Gestão de Vendas';
  const btn=document.getElementById('pa-btn');
  if(btn){btn.textContent='Criando conta...';btn.disabled=true;}
  try{
    const cred=await signUp(_paDados.email,_paDados.senha);
    const uid=cred.user.uid;
    if(btn){btn.textContent='Salvando dados...';}
    await dbSet(`usuarios/${uid}`,{nome:_paDados.nome,email:_paDados.email,perfil:'admin',criadoEm:today(),_id:uid});
    await dbSet('config/aparencia',{empresa,slogan,corPrimaria:'#2563EB',corSecundaria:'#10B981',corSucesso:'#059669',corDestaque:'#D97706',corFundo:'#F9FAFB',corSidebar:'#0F1B2D',fonte:'Inter',borderRadius:'16'});
    await dbSet('config/setup',{feito:true,criadoEm:nowStr()});
    showToast('Conta criada com sucesso! Entrando...','success');
    // Login automático: já temos o usuário autenticado pelo signUp, não precisa logar de novo
    setState({firstAccess:false,user:{uid:uid,email:_paDados.email},checking:false});
    loadAll();
  }catch(e){
    console.error('Erro ao criar conta:', e);
    let msg = e.message || 'Erro desconhecido';
    if(e.code==='auth/email-already-in-use') msg='Este e-mail já está cadastrado. Volte e use a tela de login.';
    else if(e.code==='auth/invalid-email') msg='E-mail inválido. Verifique e tente novamente.';
    else if(e.code==='auth/weak-password') msg='Senha muito fraca. Use ao menos 6 caracteres.';
    else if(e.code==='auth/operation-not-allowed') msg='Login por e-mail/senha não está ativado no Firebase. Ative em Authentication → Sign-in method.';
    else if(e.code==='auth/network-request-failed') msg='Falha de conexão. Verifique sua internet e tente novamente.';
    else if(e.message && e.message.indexOf('PERMISSION_DENIED')>=0) msg='Permissão negada ao salvar dados. As regras do Realtime Database precisam ser ajustadas.';
    showToast(msg,'error');
    // Mostra erro também de forma persistente, caso o toast passe rápido demais
    const errBox=document.getElementById('pa-error');
    if(errBox){errBox.textContent=msg;errBox.style.display='block';}
    if(btn){btn.textContent='✓ Criar conta';btn.disabled=false;}
  }
};

let _loginReset=false;
function renderLogin(){

        <h2 style="color:white;font-weight:900;margin:0 0 20px">${_loginReset?'Recuperar senha':'Entrar'}</h2>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div><label style="font-size:12px;color:#bfdbfe;display:block;margin-bottom:4px">E-mail</label>
            <input id="login-email" type="email" style="width:100%;padding:12px 16px;border-radius:12px;color:white;font-size:14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);box-sizing:border-box" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()"/></div>
          ${!_loginReset?`<div><label style="font-size:12px;color:#bfdbfe;display:block;margin-bottom:4px">Senha</label>
            <input id="login-senha" type="password" style="width:100%;padding:12px 16px;border-radius:12px;color:white;font-size:14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);box-sizing:border-box" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>`:''}
          <button onclick="${_loginReset?'doReset()':'doLogin()'}" id="login-btn" style="width:100%;padding:14px;border-radius:12px;font-weight:900;color:white;font-size:14px;border:none;cursor:pointer;margin-top:4px;background:${cor}">${_loginReset?'Enviar e-mail de recuperação':'Entrar'}</button>
          <button onclick="_loginReset=!_loginReset;render()" style="width:100%;text-align:center;color:#93c5fd;font-size:12px;background:none;border:none;cursor:pointer;padding-top:4px">${_loginReset?'← Voltar para login':'Esqueci minha senha'}</button>
        </div>
      </div>
    </div>
  </div>`;
}
window.doLogin=async function(){
  const email=document.getElementById('login-email')?.value?.trim();
  const senha=document.getElementById('login-senha')?.value;
  if(!email||!senha){showToast('Preencha e-mail e senha','error');return;}
  const btn=document.getElementById('login-btn');
  if(btn){btn.textContent='Entrando...';btn.disabled=true;}
  try{ await signIn(email,senha); }
  catch(e){
    showToast(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'?'E-mail ou senha incorretos':e.message,'error');
    if(btn){btn.textContent='Entrar';btn.disabled=false;}
  }
};
window.doReset=async function(){
  const email=document.getElementById('login-email')?.value?.trim();
  if(!email){showToast('Digite seu e-mail','error');return;}
  try{await resetPassword(email);showToast('E-mail de recuperação enviado!','success');_loginReset=false;render();}
  catch(e){showToast(e.message,'error');}
};

      <input type="number" min="1" value="${item.qty}" onchange="updQty('${item.produtoId}',this.value)" style="width:48px;text-align:center;border:1px solid #e5e7eb;border-radius:8px;padding:4px;font-size:12px;outline:none"/>
      <span style="font-size:12px;font-weight:900;color:#1f2937;width:60px;text-align:right">${fmt(item.preco*item.qty)}</span>

}
window.addItem=function(id){
  const s=getState();const p=(s.produtos||[]).find(x=>(x._id||x.id)===id);if(!p)return;
  const ex=_vItens.find(x=>x.produtoId===id);
  if(ex){_vItens=_vItens.map(x=>x.produtoId===id?Object.assign({},x,{qty:x.qty+1}):x);}
  else{_vItens=_vItens.concat([{produtoId:id,nome:p.nome,qty:1,preco:Number(p.precoVenda)}]);}
  render();
};
window.remItem=function(id){_vItens=_vItens.filter(x=>x.produtoId!==id);render();};
window.updQty=function(id,q){if(Number(q)<=0){remItem(id);return;}_vItens=_vItens.map(x=>x.produtoId===id?Object.assign({},x,{qty:Number(q)}):x);render();};
window.finalizarVenda=async function(){
  if(_vItens.length===0){showToast('Adicione produtos','error');return;}
  const s=getState();
  const cliente=(s.clientes||[]).find(c=>(c._id||c.id)===_vCliente);
  const sub=_vItens.reduce((a,b)=>a+b.preco*b.qty,0);
  const total=Math.max(sub-Number(_vDesc||0),0);
  const lucro=_vItens.reduce((a,b)=>{const p=(s.produtos||[]).find(x=>(x._id||x.id)===b.produtoId);return a+(p?(b.preco-Number(p.custo))*b.qty:0);},0)-Number(_vDesc||0);
  try{
    await dbPush('vendas',{clienteId:_vCliente||'',clienteNome:cliente?cliente.nome:'Sem cliente',produtos:JSON.stringify(_vItens),valorTotal:total,desconto:Number(_vDesc||0),formaPagamento:_vPag,dataVenda:today(),lucro:Math.max(lucro,0),criadoEm:nowStr()});
    for(const item of _vItens){const p=(s.produtos||[]).find(x=>(x._id||x.id)===item.produtoId);if(p){const pid=p._id||p.id;await dbUpdate('produtos/'+pid,{estoque:Math.max(Number(p.estoque)-item.qty,0)});}}
    showToast('Venda finalizada!','success');_vItens=[];_vCliente='';_vPag='PIX';_vDesc=0;_vTab='lista';
  }catch(e){showToast(e.message,'error');}
};
window.excluirVenda=async function(id){if(!confirm('Excluir venda?'))return;try{await dbRemove('vendas/'+id);showToast('Excluída','info');}catch(e){showToast(e.message,'error');}};

// ── JORNADA ────────────────────────────────────────────────
function pgJornada(s){
  const cor=s.config.corPrimaria||'#2563EB';
  const jornada=s.jornada||[];
  const hoje=jornada.filter(r=>(r.dataHora||'').indexOf(today())===0);
  const ultimo=hoje[hoje.length-1];
  const ordem=['entrada','inicioIntervalo','fimIntervalo','saida'];
  const pode=function(tipo){if(!ultimo)return tipo==='entrada';const idx=ordem.indexOf(ultimo.tipoRegistro);return ordem.indexOf(tipo)===idx+1;};
  const e=hoje.find(r=>r.tipoRegistro==='entrada'),sai=hoje.find(r=>r.tipoRegistro==='saida');
  const ii=hoje.find(r=>r.tipoRegistro==='inicioIntervalo'),fi=hoje.find(r=>r.tipoRegistro==='fimIntervalo');
  let horas=0;
  if(e){const now=new Date();let t=((sai?new Date(sai.dataHora):now)-new Date(e.dataHora))/3600000;if(ii&&fi)t-=(new Date(fi.dataHora)-new Date(ii.dataHora))/3600000;else if(ii&&!fi)t-=(now-new Date(ii.dataHora))/3600000;horas=Math.max(t,0);}
  const lbl={entrada:'Entrada',inicioIntervalo:'Início Intervalo',fimIntervalo:'Fim Intervalo',saida:'Saída'};
  const btns=[{t:'entrada',l:'Entrada',c:'#10B981'},{t:'inicioIntervalo',l:'Intervalo',c:'#F59E0B'},{t:'fimIntervalo',l:'Retorno',c:cor},{t:'saida',l:'Saída',c:'#EF4444'}];
  if(!window._jorInterval){window._jorInterval=setInterval(function(){const el=document.getElementById('jor-clock');if(el)el.textContent=new Date().toLocaleTimeString('pt-BR');},1000);}
  return `<div style="display:flex;flex-direction:column;gap:20px">
    <h2 style="font-size:22px;font-weight:900;color:#1f2937;margin:0">Jornada de Trabalho</h2>
    <div style="background:white;border-radius:16px;padding:28px;border:1px solid #f1f5f9;text-align:center">
      <p id="jor-clock" style="font-size:42px;font-weight:900;color:#1f2937;font-family:monospace;margin:0;letter-spacing:-2px">${new Date().toLocaleTimeString('pt-BR')}</p>
      <p style="color:#9ca3af;margin:8px 0;text-transform:capitalize;font-size:12px">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})}</p>
      <div style="display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:12px;font-weight:900;margin-top:8px;font-size:12px;background:${cor}18;color:${cor}">
        ${icon('jornada',15)} ${Math.floor(horas)}h ${Math.round((horas%1)*60)}min hoje
      </div>
      ${ultimo?`<p style="font-size:11px;color:#9ca3af;margin:8px 0 0">Último: ${lbl[ultimo.tipoRegistro]} às ${new Date(ultimo.dataHora).toLocaleTimeString('pt-BR')}</p>`:''}
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
      ${btns.map(b=>`<button onclick="registrarPonto('${b.t}')" ${!pode(b.t)?'disabled':''} style="padding:20px;border-radius:16px;border:none;cursor:${pode(b.t)?'pointer':'not-allowed'};color:white;font-weight:900;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:8px;background:${b.c};opacity:${pode(b.t)?1:0.3}">${icon(b.t==='entrada'?'check':b.t==='saida'?'logout':'jornada',26)}<span>${b.l}</span></button>`).join('')}
    </div>
    <div style="background:white;border-radius:16px;padding:18px;border:1px solid #f1f5f9">
      <h3 style="font-weight:700;color:#374151;margin:0 0 16px;font-size:13px">Registros de Hoje</h3>
      ${hoje.length===0?'<p style="color:#9ca3af;font-size:13px;text-align:center;padding:20px 0">Nenhum registro. Clique em Entrada para começar.</p>':
      hoje.map(r=>`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f9fafb">
        <div style="width:9px;height:9px;border-radius:50%;background:${cor};flex-shrink:0"></div>
        <span style="flex:1;font-size:13px;font-weight:700;color:#374151">${lbl[r.tipoRegistro]||r.tipoRegistro}</span>
        <span style="font-size:12px;font-family:monospace;color:#9ca3af">${new Date(r.dataHora).toLocaleTimeString('pt-BR')}</span>
      </div>`).join('')}
    </div>
  </div>`;
}
window.registrarPonto=async function(tipo){
  try{await dbPush('jornada',{tipoRegistro:tipo,dataHora:nowStr(),localizacao:null});showToast('Ponto registrado!','success');}catch(e){showToast(e.message,'error');}
};

let _relPer='mes';
function pgRelatorios(s){
  const cor=s.config.corPrimaria||'#2563EB';

  const tV=sum(vds),tL=sum(vds,'lucro'),ticket=vds.length?tV/vds.length:0;
  const porPag={};vds.forEach(function(v){porPag[v.formaPagamento]=(porPag[v.formaPagamento]||0)+Number(v.valorTotal||0);});
  const pgE=Object.entries(porPag).sort(function(a,b){return b[1]-a[1];});const pgC=[cor,'#7C3AED','#059669','#D97706','#DC2626'];
  return `<div style="display:flex;flex-direction:column;gap:20px">

      <div style="display:flex;gap:8px">${[['hoje','Hoje'],['semana','Semana'],['mes','Mês']].map(function(o){return `<button onclick="_relPer='${o[0]}';render()" style="padding:8px 12px;border-radius:12px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:${_relPer===o[0]?cor:'#F1F5F9'};color:${_relPer===o[0]?'#fff':'#6b7280'}">${o[1]}</button>`;}).join('')}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
      ${[{l:'Faturamento',v:fmt(tV),c:cor},{l:'Lucro Estimado',v:fmt(tL),c:'#059669'},{l:'Ticket Médio',v:fmt(ticket),c:'#D97706'},{l:'Qtd. Vendas',v:vds.length,c:'#7C3AED'}].map(function(c){return `<div style="background:white;border-radius:16px;padding:16px;border:1px solid #f1f5f9;text-align:center"><p style="font-size:18px;font-weight:900;margin:0;color:${c.c}">${c.v}</p><p style="font-size:10px;font-weight:700;color:#9ca3af;margin:4px 0 0">${c.l}</p></div>`;}).join('')}
    </div>
    <div style="background:white;border-radius:16px;padding:18px;border:1px solid #f1f5f9">
      <h3 style="font-weight:700;color:#374151;margin:0 0 16px;font-size:13px">Por Forma de Pagamento</h3>
      ${pgE.length===0?'<p style="color:#9ca3af;font-size:13px;text-align:center;padding:20px 0">Sem dados</p>':
      pgE.map(function(item,i){return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="font-weight:700;color:#374151">${item[0]}</span><span style="font-weight:900;color:#1f2937">${fmt(item[1])}</span></div>${pbar(item[1],tV||1,pgC[i])}</div>`;}).join('')}
    </div>
    <div style="background:white;border-radius:16px;padding:18px;border:1px solid #f1f5f9">
      <h3 style="font-weight:700;color:#374151;margin:0 0 16px;font-size:13px">Resumo Financeiro</h3>
      ${[{l:'Faturamento bruto',v:fmt(tV+sum(vds,'desconto')),c:'#1f2937'},{l:'Descontos',v:'- '+fmt(sum(vds,'desconto')),c:'#ef4444'},{l:'Lucro estimado',v:fmt(tL),c:'#16a34a'},{l:'Margem de lucro',v:tV?fmtPct((tL/tV)*100):'0%',c:'#16a34a'}].map(function(r){return `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f9fafb;font-size:12px"><span style="color:#6b7280">${r.l}</span><span style="font-weight:700;color:${r.c}">${r.v}</span></div>`;}).join('')}
    </div>
  </div>`;
}

window.salvarUser=async function(){
  const nome=gV('us-nome'),email=gV('us-email'),id=gV('us-id');
  if(!nome||!email){showToast('Nome e e-mail obrigatórios','error');return;}
  try{
    if(!id){
      const senha=(document.getElementById('us-senha')||{}).value||'';
      if(!senha||senha.length<6){showToast('Senha mínimo 6 caracteres','error');return;}
      const cred=await signUp(email,senha);
      await dbSet('usuarios/'+cred.user.uid,{nome,email,perfil:gV('us-perfil')||'vendedor',criadoEm:today(),_id:cred.user.uid});
      showToast('Usuário criado!','success');
    }else{
      await dbUpdate('usuarios/'+id,{nome,email,perfil:gV('us-perfil')||'vendedor'});
      showToast('Atualizado!','success');
    }
    closeModal();
  }catch(e){showToast(e.code==='auth/email-already-in-use'?'E-mail já cadastrado':e.message,'error');}

window.salvarEmpresa=async function(){
  const s=getState();
  const patch=Object.assign({},s.config,{empresa:gV('emp-nome'),slogan:gV('emp-slogan'),cnpj:gV('emp-cnpj'),telEmpresa:gV('emp-tel'),emailEmpresa:gV('emp-email'),site:gV('emp-site'),enderecoEmpresa:gV('emp-end')});
  try{await dbSet('config/aparencia',patch);setState({config:patch});applyConfig(patch);showToast('Dados da empresa salvos!','success');}catch(e){showToast(e.message,'error');}
};
window.alterarSenha=async function(){
  const nova=(document.getElementById('pw-nova')||{}).value||'';
  const conf=(document.getElementById('pw-conf')||{}).value||'';
  if(!nova||nova.length<6){showToast('Senha mínimo 6 caracteres','error');return;}
  if(nova!==conf){showToast('As senhas não coincidem','error');return;}
  try{
    await changePassword(nova);showToast('Senha alterada com sucesso!','success');
    document.getElementById('pw-nova').value='';document.getElementById('pw-conf').value='';
  }catch(e){showToast(e.message,'error');}
};

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
window.navTo=function(page){
  if(window._jorInterval&&page!=='jornada'){clearInterval(window._jorInterval);window._jorInterval=null;}
  setState({page,sidebarOpen:false});
};
window.doSignOut=async function(){ await signOut(); setState({user:null,page:'dashboard'}); };

// ═══════════════════════════════════════════════════════════
// LOAD ALL DATA (realtime listeners)
// ═══════════════════════════════════════════════════════════
let _offs=[];
function loadAll(){
  _offs.forEach(function(f){f();}); _offs=[];
  setState({loading:true});
  const cols=['vendas','clientes','produtos','jornada','financeiro','movEstoque','usuarios'];
  cols.forEach(function(col){
    const off=dbListen(col,function(arr){ setState(function(s){const patch={};patch[col]=arr;patch.loading=false;return patch;}); });
    _offs.push(off);
  });
  ref('config/aparencia').on('value',function(snap){
    const val=snap.val();
    if(val){ applyConfig(val); setState(function(s){return {config:Object.assign({},s.config,val)};}); }
  });
  ref('config/metas').on('value',function(snap){
    const val=snap.val();
    if(val) setState({metas:val});
  });
  _offs.push(function(){ref('config/aparencia').off();});
  _offs.push(function(){ref('config/metas').off();});
  setTimeout(function(){setState({loading:false});},3000);
}
window.loadAll=loadAll;

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  const s=getState();
  const el=document.getElementById('app');
  if(!el) return;
  if(s.checking){ el.innerHTML=renderLoading(); return; }
  if(s.firstAccess){ el.innerHTML=renderPrimeiroAcesso(); return; }
  if(!s.user){ el.innerHTML=renderLogin(); return; }
  el.innerHTML=renderApp();
}

// ═══════════════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════════════
render();

try {
  auth.onAuthStateChanged(async function(user){
    if(user){
      setState({user:{uid:user.uid,email:user.email},checking:false,firstAccess:false});
      loadAll();
    }else{
      try{
        const setup=await dbGet('config/setup');
        if(!setup||!setup.feito){ setState({checking:false,firstAccess:true,user:null}); }
        else{ setState({checking:false,firstAccess:false,user:null}); }
      }catch(e){
        // Provavelmente as regras do Firebase estão bloqueando leitura sem login.
        // Assumimos primeiro acesso para permitir criar a conta inicial.
        setState({checking:false,firstAccess:true,user:null});
      }
    }
  }, function(err){
    showFatalError('Erro de autenticação: ' + (err.message || 'verifique a configuração do Firebase Authentication.'));
  });
} catch (e) {
  showFatalError('Erro ao iniciar o sistema: ' + (e.message || 'tente novamente.'));
}

// Failsafe: se nada renderizou em 8s, mostra erro em vez de tela branca
setTimeout(function(){
  const el = document.getElementById('app');
  if (el && el.innerHTML.trim() === '') {
    showFatalError('O sistema demorou demais para responder. Verifique sua conexão e as configurações do Firebase (Authentication e Realtime Database precisam estar ativados no console).');
  }
}, 8000);
</script>
